name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 3 * * 1'

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL (TypeScript)
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: typescript
      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:typescript

  dependency-review:
    name: Dependency review
    if: ${{ github.event_name == 'pull_request' && github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download and verify Gitleaks 8.30.1
        shell: bash
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          archive_path="${RUNNER_TEMP}/${archive}"
          install_dir="${RUNNER_TEMP}/gitleaks-bin"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            --output "${archive_path}"
          printf '%s  %s\n' "${GITLEAKS_SHA256}" "${archive_path}" | sha256sum --check --strict -
          mkdir -p "${install_dir}"
          tar --extract --gzip --file "${archive_path}" --directory "${install_dir}" gitleaks
          chmod 0755 "${install_dir}/gitleaks"
          echo "${install_dir}" >> "${GITHUB_PATH}"
      - name: Scan for secrets
        shell: bash
        env:
          GITLEAKS_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          GITLEAKS_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          base_sha="${GITLEAKS_BASE_SHA:-}"
          head_sha="${GITLEAKS_HEAD_SHA}"

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            log_opts="-1"
          elif [[ -n "${base_sha}" && ! "${base_sha}" =~ ^0+$ ]] \
            && git cat-file -e "${base_sha}^{commit}" \
            && git cat-file -e "${head_sha}^{commit}"; then
            log_opts="${base_sha}..${head_sha}"
          else
            log_opts="${head_sha}"
          fi

          gitleaks git --redact=100 --verbose --no-banner --no-color --log-opts="${log_opts}" .

  advisory-gate:
    name: pnpm audit (high/critical)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
      - name: Reject high and critical advisories
        run: pnpm audit --audit-level=high
